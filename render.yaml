services:
  # Backend API — Node.js Express
  - type: web
    name: groweasy-backend
    runtime: node
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: PORT
        value: 5000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: AI_BATCH_SIZE
        value: 20
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        fromService:
          name: groweasy-frontend
          type: web
          property: host

  # Frontend — Next.js
  - type: web
    name: groweasy-frontend
    runtime: node
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          name: groweasy-backend
          type: web
          property: hostport
      - key: NODE_ENV
        value: production
