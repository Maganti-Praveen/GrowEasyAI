services:
  - type: web
    name: groweasy-crm-importer
    runtime: node
    region: oregon
    buildCommand: npm run render-build
    startCommand: node backend/src/index.js
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: AI_BATCH_SIZE
        value: 20
      - key: NODE_ENV
        value: production
